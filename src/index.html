<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Youtube Downloader</title>
    <!-- On lie notre nouveau fichier de style -->
    <link rel="stylesheet" href="style.css" />
    <!-- On importe une police plus moderne depuis Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <!-- Vous pouvez remplacer `icon.png` par le chemin vers votre logo -->
        <h1>Youtube Downloader</h1>
      </div>
      <p class="subtitle">
        Conversion vers MP3 en Haute Qualité (320 kbps)
      </p>

      <div class="input-group">
        <input
          type="text"
          id="urlInput"
          placeholder="Collez votre lien YouTube ici..."
        />
      </div>
      <button id="downloadBtn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span>Télécharger</span>
      </button>

      <div class="status-container">
        <div class="progress-container">
          <div id="progressBar"></div>
        </div>
        <p id="statusLabel"><strong>Dannyydev</strong></p>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
